name: Build OpenWrt kmod

on:
workflow_dispatch:

jobs:
build:
runs-on: ubuntu-latest

```
steps:
- name: Install dependencies
  run: |
    sudo apt update
    sudo apt install build-essential clang flex bison g++ gawk gcc-multilib gettext git libncurses-dev libssl-dev python3 python3-distutils rsync unzip zlib1g-dev file wget

- name: Download OpenWrt SDK
  run: |
    wget https://downloads.openwrt.org/releases/23.05.3/targets/ipq40xx/generic/openwrt-sdk-23.05.3-ipq40xx-generic_gcc-12.3.0_musl.Linux-x86_64.tar.xz
    tar -xf openwrt-sdk-*.tar.xz
    mv openwrt-sdk-* sdk

- name: Update feeds
  run: |
    cd sdk
    ./scripts/feeds update -a
    ./scripts/feeds install -a

- name: Enable kmod-usb-storage
  run: |
    cd sdk
    echo "CONFIG_PACKAGE_kmod-usb-storage=m" >> .config
    make defconfig

- name: Build module
  run: |
    cd sdk
    make package/kernel/linux/compile V=s

- name: Upload artifact
  uses: actions/upload-artifact@v4
  with:
    name: openwrt-kmod
    path: sdk/bin/
```
